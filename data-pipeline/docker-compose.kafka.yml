# data-pipeline/docker-compose.kafka.yml
#
# Starts Kafka broker (KRaft mode) + Kafdrop web UI.
# Spark consumer is opt-in via --profile spark.
#
# Usage:
#   docker compose -f data-pipeline/docker-compose.kafka.yml up -d
#
# Kafka UI:   http://localhost:9000  (Kafdrop)
# Kafka port: localhost:9092
#
# Stop:
#   docker compose -f data-pipeline/docker-compose.kafka.yml down

services:

  # ── Kafka Broker (KRaft — official Apache image, no Zookeeper) ────────────
  kafka:
    image: apache/kafka:latest
    container_name: dcx-kafka
    hostname: kafka
    ports:
      - "9092:9092"    # host access
    environment:
      # KRaft — single-node broker + controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "nextbrick-kafka-cluster-01"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Kafdrop — Kafka Web UI ─────────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: dcx-kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:9092"
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Spark Consumer (optional —  --profile spark) ──────────────────────────
  spark-consumer:
    image: apache/spark:3.5.1
    container_name: dcx-spark-consumer
    profiles: ["spark"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_CHAT_EVENTS=chat.events
      - SPARK_OUTPUT_PATH=/app/output/chat_events
      - SPARK_CHECKPOINT=/app/output/.checkpoints
    volumes:
      - ./consumer:/app/consumer
      - spark-output:/app/output
    working_dir: /app
    entrypoint: >
      /opt/spark/bin/spark-submit
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
        consumer/spark_consumer.py
    restart: unless-stopped

volumes:
  kafka-data:
  spark-output:
