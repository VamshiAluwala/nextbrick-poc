# ─── docker-compose.yml ───────────────────────────────────────────────────────
# Keysight Agentic AI POC — two-container compose (alternative to `make run`)
#
# Usage:
#   make compose-up    →  docker compose up --build -d
#   make compose-down  →  docker compose down
#
# For a single-container build use: make build && make run
# ─────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  backend:
    build:
      context: .            # root — Dockerfile at project root
      dockerfile: Dockerfile
      target: runtime       # use the combined runtime stage
    container_name: keysight-app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

# Single service — both frontend and backend run inside the same container
# via supervisord. No separate frontend service needed.
